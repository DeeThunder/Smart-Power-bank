<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Power | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@300;400;600;800&family=DM+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #060708;
            --card: #0c0f12;
            --accent: #00ff88;
            --text: #f1f5f9;
            --text-dim: #94a3b8;
            --border: rgba(255,255,255,0.08);
            --danger: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Manrope', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .phone-mockup {
            width: 100%;
            max-width: 400px;
            background: var(--card);
            border-radius: 40px;
            border: 2px solid var(--border);
            padding: 30px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            position: relative;
        }

        header { margin-bottom: 40px; }
        .eyebrow { font-size: 10px; letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 5px; }
        .title { font-family: 'Bebas Neue', sans-serif; font-size: 48px; line-height: 1; letter-spacing: 1px; }
        
        .serial-badge {
            font-family: 'DM Mono', monospace;
            font-size: 9px;
            background: rgba(255,255,255,0.05);
            padding: 2px 6px;
            border-radius: 4px;
            color: var(--text-dim);
            margin-top: 5px;
            display: inline-block;
        }

        .battery-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 30px;
            text-align: center;
            margin-bottom: 20px;
        }

        .pct { font-family: 'Bebas Neue', sans-serif; font-size: 80px; line-height: 1; }
        .pct-unit { font-size: 30px; color: var(--accent); }

        .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 30px; }
        .metric-item { background: rgba(255,255,255,0.02); padding: 15px 5px; border-radius: 12px; border: 1px solid var(--border); }
        .m-val { font-family: 'DM Mono', monospace; font-size: 14px; display: block; margin-bottom: 2px; }
        .m-lbl { font-size: 9px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }

        .btn-toggle {
            width: 100%;
            padding: 20px;
            border-radius: 20px;
            background: var(--accent);
            color: #000;
            border: none;
            font-family: 'Manrope', sans-serif;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.2s;
        }

        .btn-toggle.off { background: #1f262d; color: var(--text-dim); }
        .btn-toggle:disabled { opacity: 0.3; cursor: not-allowed; }

        .controls-row { display: flex; gap: 10px; margin-top: 20px; }
        .btn-secondary {
            flex: 1;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 10px;
            text-transform: uppercase;
            font-weight: 600;
        }
        
        .btn-connect { border-color: var(--accent); color: var(--accent); }

        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; background: var(--danger); margin-right: 5px; }
        .status-dot.online { background: var(--accent); box-shadow: 0 0 10px var(--accent); }
    </style>
</head>
<body>

    <div class="phone-mockup">
        <header>
            <div class="eyebrow">Project Nexus</div>
            <div class="title">NEXUS POWER</div>
            <div id="status-container" style="font-size: 11px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <span class="status-dot" id="dot"></span> 
                    <span id="status-text" style="color: var(--text-dim)">OFFLINE</span>
                </div>
                <div id="serial-id" class="serial-badge">SN: --------</div>
            </div>
        </header>

        <div class="battery-card">
            <div class="pct" id="pct">--<span class="pct-unit">%</span></div>
            <div class="metrics">
                <div class="metric-item"><span class="m-val" id="volts">-- V</span><span class="m-lbl">Voltage</span></div>
                <div class="metric-item"><span class="m-val" id="amps">-- A</span><span class="m-lbl">Current</span></div>
                <div class="metric-item"><span class="m-val" id="watts">-- W</span><span class="m-lbl">Power</span></div>
            </div>
        </div>

        <button class="btn-toggle off" id="btnPower" disabled>POWER OFF</button>
        
        <div class="controls-row">
            <button class="btn-secondary btn-connect" id="btnConnect">Connect</button>
            <button class="btn-secondary" id="btnDisconnect" style="display:none">Disconnect</button>
        </div>
    </div>

    <script>
        let device, server, service, charData, charCtrl;
        let isPowerOn = false;

        const SVC_UUID = '0000ff01-0000-1000-8000-00805f9b34fb';
        const CHR_DATA = '0000ff02-0000-1000-8000-00805f9b34fb';
        const CHR_CTRL = '0000ff03-0000-1000-8000-00805f9b34fb';

        async function connect() {
            try {
                console.log("Requesting device...");
                device = await navigator.bluetooth.requestDevice({
                    filters: [
                        { name: 'Nexus Power' },
                        { services: [SVC_UUID] }
                    ],
                    optionalServices: [SVC_UUID]
                });

                device.addEventListener('gattserverdisconnected', onDisconnected);

                console.log("Connecting to GATT server...");
                server = await device.gatt.connect();
                service = await server.getPrimaryService(SVC_UUID);
                charData = await service.getCharacteristic(CHR_DATA);
                charCtrl = await service.getCharacteristic(CHR_CTRL);

                updateUIStatus(true);
                
                await charData.startNotifications();
                charData.addEventListener('characteristicvaluechanged', handleData);

            } catch (err) {
                console.error(err);
                alert("Connection failed: " + err);
            }
        }

        function onDisconnected() {
            updateUIStatus(false);
            console.log("Device disconnected");
        }

        function disconnect() {
            if (device && device.gatt.connected) {
                device.gatt.disconnect();
            }
        }

        function updateUIStatus(connected) {
            document.getElementById('status-text').innerText = connected ? 'CONNECTED' : 'OFFLINE';
            document.getElementById('dot').className = connected ? 'status-dot online' : 'status-dot';
            document.getElementById('btnPower').disabled = !connected;
            document.getElementById('btnConnect').style.display = connected ? 'none' : 'block';
            document.getElementById('btnDisconnect').style.display = connected ? 'block' : 'none';
            
            if(!connected) {
                document.getElementById('serial-id').innerText = 'SN: --------';
                document.getElementById('serial-id').style.color = 'var(--text-dim)';
                document.getElementById('volts').innerText = '-- V';
                document.getElementById('amps').innerText = '-- A';
                document.getElementById('watts').innerText = '-- W';
                document.getElementById('pct').innerHTML = '--<span class="pct-unit">%</span>';
            }
        }

        let authorizedSerials = [];
        fetch('devices.json')
            .then(r => r.json())
            .then(data => authorizedSerials = data.authorized_serials)
            .catch(e => console.log("No registry found"));

        function handleData(event) {
            const view = event.target.value;
            // Packet: [float V, float I, float P, uint8_t %, uint8_t[3] mac, uint8_t sig]
            const v = view.getFloat32(0, true).toFixed(2);
            const i = (view.getFloat32(4, true) / 1000).toFixed(2);
            const p = (view.getFloat32(8, true) / 1000).toFixed(2);
            const pct = view.getUint8(12);
            
            // Security Verification
            const m1 = view.getUint8(13);
            const m2 = view.getUint8(14);
            const m3 = view.getUint8(15);
            const sig = view.getUint8(16);
            const SECRET = 0xAC;

            const isValid = ((m1 + m2 + m3) & 0xFF) ^ SECRET;
            
            let snDisplay = "";
            let snRaw = "";
            if (sig === isValid) {
                const snSuffix = `${m1.toString(16).padStart(2,'0')}${m2.toString(16).padStart(2,'0')}${m3.toString(16).padStart(2,'0')}`.toUpperCase();
                snRaw = `NX-${snSuffix}`;
                
                // Check Registry
                if (authorizedSerials.includes(snRaw)) {
                    snDisplay = `✅ VERIFIED: ${snRaw}`;
                    document.getElementById('serial-id').style.color = 'var(--accent)';
                } else {
                    snDisplay = `⚠️ UNREGISTERED: ${snRaw}`;
                    document.getElementById('serial-id').style.color = '#eab308';
                }
            } else {
                snDisplay = "🚨 FAKE HARDWARE";
                document.getElementById('serial-id').style.color = 'var(--danger)';
            }

            document.getElementById('volts').innerText = v + ' V';
            document.getElementById('amps').innerText = i + ' A';
            document.getElementById('watts').innerText = p + ' W';
            document.getElementById('pct').innerHTML = pct + '<span class="pct-unit">%</span>';
            document.getElementById('serial-id').innerText = snDisplay;
        }

        async function togglePower() {
            isPowerOn = !isPowerOn;
            const val = new Uint8Array([isPowerOn ? 1 : 0]);
            try {
                await charCtrl.writeValue(val);
                const btn = document.getElementById('btnPower');
                btn.innerText = isPowerOn ? 'POWER ON' : 'POWER OFF';
                btn.classList.toggle('off', !isPowerOn);
            } catch (err) {
                console.error("Toggle failed", err);
            }
        }

        document.getElementById('btnConnect').onclick = connect;
        document.getElementById('btnDisconnect').onclick = disconnect;
        document.getElementById('btnPower').onclick = togglePower;

    </script>
</body>
</html>
