<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Power | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@300;400;600;800&family=DM+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #060708;
            --card: #0c0f12;
            --accent: #00ff88;
            --text: #f1f5f9;
            --text-dim: #94a3b8;
            --border: rgba(255,255,255,0.08);
            --danger: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Manrope', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
        }

        .phone-mockup {
            width: 100%;
            max-width: 400px;
            background: var(--card);
            border-radius: 40px;
            border: 2px solid var(--border);
            padding: 30px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            position: relative;
            z-index: 1;
        }

        header { margin-bottom: 40px; display: flex; justify-content: space-between; align-items: flex-start; }
        .title-group { flex: 1; }
        .eyebrow { font-size: 10px; letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 5px; }
        .title { font-family: 'Bebas Neue', sans-serif; font-size: 48px; line-height: 1; letter-spacing: 1px; }
        
        .btn-icon { background: transparent; border: none; color: var(--text-dim); cursor: pointer; padding: 5px; }

        .serial-badge {
            font-family: 'DM Mono', monospace;
            font-size: 9px;
            background: rgba(255,255,255,0.05);
            padding: 2px 6px;
            border-radius: 4px;
            color: var(--text-dim);
            margin-top: 5px;
            display: inline-block;
        }

        .battery-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 30px;
            text-align: center;
            margin-bottom: 20px;
        }

        .pct { font-family: 'Bebas Neue', sans-serif; font-size: 80px; line-height: 1; }
        .pct-unit { font-size: 30px; color: var(--accent); }

        .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 30px; }
        .metric-item { background: rgba(255,255,255,0.02); padding: 15px 5px; border-radius: 12px; border: 1px solid var(--border); }
        .m-val { font-family: 'DM Mono', monospace; font-size: 14px; display: block; margin-bottom: 2px; }
        .m-lbl { font-size: 9px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }

        .btn-toggle {
            width: 100%;
            padding: 20px;
            border-radius: 20px;
            background: var(--accent);
            color: #000;
            border: none;
            font-family: 'Manrope', sans-serif;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.2s;
        }
        .btn-toggle.off { background: #1f262d; color: var(--text-dim); }
        .btn-toggle:disabled { opacity: 0.3; cursor: not-allowed; }

        .btn-connect { margin-top: 20px; background: transparent; border: 1px solid var(--accent); color: var(--accent); width: 100%; padding: 12px; border-radius: 12px; cursor: pointer; font-size: 12px; font-weight: 600; text-transform: uppercase; }

        /* Sidebar Settings */
        .sidebar {
            position: fixed;
            right: -100%;
            top: 0;
            width: 300px;
            height: 100%;
            background: #111418;
            border-left: 1px solid var(--border);
            z-index: 100;
            padding: 40px 30px;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: -20px 0 40px rgba(0,0,0,0.5);
        }
        .sidebar.active { right: 0; }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .sidebar-title { font-family: 'Bebas Neue', sans-serif; font-size: 24px; }
        
        .setting-group { margin-bottom: 30px; }
        .setting-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; display: block; }
        .setting-input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 10px; padding: 12px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 14px; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); opacity: 0; visibility: hidden; transition: 0.3s; z-index: 90; }
        .overlay.active { opacity: 1; visibility: visible; }

        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; background: var(--danger); margin-right: 5px; }
        .status-dot.online { background: var(--accent); box-shadow: 0 0 10px var(--accent); }
    </style>
</head>
<body>

    <div class="phone-mockup">
        <header>
            <div class="title-group">
                <div class="eyebrow">Project Nexus</div>
                <div class="title">NEXUS POWER</div>
            </div>
            <button class="btn-icon" onclick="toggleSidebar()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            </button>
        </header>

        <div id="status-container" style="font-size: 11px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;">
            <div>
                <span class="status-dot" id="dot"></span> 
                <span id="status-text" style="color: var(--text-dim)">OFFLINE</span>
            </div>
            <div id="serial-id" class="serial-badge">SN: --------</div>
        </div>

        <div class="battery-card">
            <div class="pct" id="pct">--<span class="pct-unit">%</span></div>
            <div class="metrics">
                <div class="metric-item"><span class="m-val" id="volts">-- V</span><span class="m-lbl">Voltage</span></div>
                <div class="metric-item"><span class="m-val" id="amps">-- A</span><span class="m-lbl">Current</span></div>
                <div class="metric-item"><span class="m-val" id="watts">-- W</span><span class="m-lbl">Power</span></div>
            </div>
        </div>

        <button class="btn-toggle off" id="btnPower" disabled>POWER OFF</button>
        <button class="btn-connect" id="btnConnect">Connect to Device</button>
    </div>

    <!-- Settings Sidebar -->
    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-title">Security Settings</div>
            <button class="btn-icon" onclick="toggleSidebar()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"></path></svg>
            </button>
        </div>
        
        <div class="setting-group">
            <label class="setting-label">Project Secret Key</label>
            <input type="text" id="inputKey" class="setting-input" placeholder="0x00" onchange="saveKey(this.value)">
            <p style="font-size: 10px; color: var(--text-dim); margin-top: 10px;">The master secret used to verify hardware authenticity.</p>
        </div>

        <div class="setting-group">
            <button class="btn-connect" onclick="location.reload()" style="border-color: var(--danger); color: var(--danger);">Hard Reset App</button>
        </div>
    </div>

    <script>
        let device, server, service, charData, charCtrl;
        let isPowerOn = false;
        let PROJECT_KEY = localStorage.getItem('nexus_key') || '0x00';

        const SVC_UUID = '0000ff01-0000-1000-8000-00805f9b34fb';
        const CHR_DATA = '0000ff02-0000-1000-8000-00805f9b34fb';
        const CHR_CTRL = '0000ff03-0000-1000-8000-00805f9b34fb';

        // Init settings UI
        document.getElementById('inputKey').value = PROJECT_KEY;

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function saveKey(val) {
            PROJECT_KEY = val;
            localStorage.setItem('nexus_key', val);
            console.log("Key updated to", val);
        }

        let authorizedSerials = [];
        fetch('devices.json')
            .then(r => r.json())
            .then(data => authorizedSerials = data.authorized_serials)
            .catch(e => console.log("No registry found"));

        async function connect() {
            try {
                device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'Nexus Power' }, { services: [SVC_UUID] }],
                    optionalServices: [SVC_UUID]
                });

                device.addEventListener('gattserverdisconnected', onDisconnected);
                server = await device.gatt.connect();
                service = await server.getPrimaryService(SVC_UUID);
                charData = await service.getCharacteristic(CHR_DATA);
                charCtrl = await service.getCharacteristic(CHR_CTRL);

                updateUIStatus(true);
                await charData.startNotifications();
                charData.addEventListener('characteristicvaluechanged', handleData);
            } catch (err) {
                console.error(err);
                alert("Connection failed: " + err);
            }
        }

        function onDisconnected() { updateUIStatus(false); }

        function updateUIStatus(connected) {
            document.getElementById('status-text').innerText = connected ? 'CONNECTED' : 'OFFLINE';
            document.getElementById('dot').className = connected ? 'status-dot online' : 'status-dot';
            document.getElementById('btnPower').disabled = !connected;
            document.getElementById('btnConnect').style.display = connected ? 'none' : 'block';
            if(!connected) {
                document.getElementById('serial-id').innerText = 'SN: --------';
                document.getElementById('volts').innerText = '-- V';
                document.getElementById('amps').innerText = '-- A';
                document.getElementById('watts').innerText = '-- W';
                document.getElementById('pct').innerHTML = '--<span class="pct-unit">%</span>';
            }
        }

        function handleData(event) {
            const view = event.target.value;
            const v = view.getFloat32(0, true).toFixed(2);
            const i = (view.getFloat32(4, true) / 1000).toFixed(2);
            const p = (view.getFloat32(8, true) / 1000).toFixed(2);
            const pct = view.getUint8(12);
            
            const m1 = view.getUint8(13);
            const m2 = view.getUint8(14);
            const m3 = view.getUint8(15);
            const sig = view.getUint8(16);
            const SECRET = parseInt(PROJECT_KEY, 16);

            const isValid = ((m1 + m2 + m3) & 0xFF) ^ SECRET;
            
            let snDisplay = "";
            if (sig === isValid) {
                const snRaw = `NX-${m1.toString(16).padStart(2,'0')}${m2.toString(16).padStart(2,'0')}${m3.toString(16).padStart(2,'0')}`.toUpperCase();
                if (authorizedSerials.includes(snRaw)) {
                    snDisplay = `✅ VERIFIED: ${snRaw}`;
                    document.getElementById('serial-id').style.color = 'var(--accent)';
                } else {
                    snDisplay = `⚠️ UNREGISTERED: ${snRaw}`;
                    document.getElementById('serial-id').style.color = '#eab308';
                }
            } else {
                snDisplay = "🚨 AUTH FAILURE";
                document.getElementById('serial-id').style.color = 'var(--danger)';
            }

            document.getElementById('volts').innerText = v + ' V';
            document.getElementById('amps').innerText = i + ' A';
            document.getElementById('watts').innerText = p + ' W';
            document.getElementById('pct').innerHTML = pct + '<span class="pct-unit">%</span>';
            document.getElementById('serial-id').innerText = snDisplay;
        }

        async function togglePower() {
            isPowerOn = !isPowerOn;
            const val = new Uint8Array([isPowerOn ? 1 : 0]);
            await charCtrl.writeValue(val);
            const btn = document.getElementById('btnPower');
            btn.innerText = isPowerOn ? 'POWER ON' : 'POWER OFF';
            btn.classList.toggle('off', !isPowerOn);
        }

        document.getElementById('btnConnect').onclick = connect;
        document.getElementById('btnPower').onclick = togglePower;

    </script>
</body>
</html>
